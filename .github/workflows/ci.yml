name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, dev, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.HOMECLOUD_SDK_CHECKOUT_TOKEN || github.token }}

      - name: Verify homecloud-sdk
        run: test -f homecloud-sdk/pyproject.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ./homecloud-sdk
          pip install -e ".[dev]"

      - run: pytest tests/ -q
