name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  HOMECLOUD_CLI_BUCKET: homecloud-cli
  HOMECLOUD_CLI_PUBLIC_BASE: https://homecloud-cli.so.holab.abrdns.com/releases

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            script: bash scripts/build-binary.sh
          # darwin-amd64 (macos-13) disabled — GitHub Intel Mac runners queue indefinitely on free tier
          - os: macos-latest
            target: darwin-arm64
            script: bash scripts/build-binary.sh
          - os: windows-latest
            target: windows-amd64
            script: powershell -File scripts/build-binary.ps1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build binary
        run: ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/homecloud-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true

      - name: Upload to MinIO (public bucket)
        env:
          HOMECLOUD_S3_ENDPOINT: ${{ secrets.HOMECLOUD_S3_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.HOMECLOUD_CLI_S3_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.HOMECLOUD_CLI_S3_SECRET_KEY }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BUCKET="${HOMECLOUD_CLI_BUCKET}"

          if [[ -z "${HOMECLOUD_S3_ENDPOINT}" || -z "${MINIO_ACCESS_KEY}" || -z "${MINIO_SECRET_KEY}" ]]; then
            echo "::error::Missing MinIO secrets. Add HOMECLOUD_S3_ENDPOINT, HOMECLOUD_CLI_S3_ACCESS_KEY, HOMECLOUD_CLI_S3_SECRET_KEY to repo secrets."
            exit 1
          fi

          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/

          mc alias set hc "${HOMECLOUD_S3_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"

          for f in artifacts/homecloud-*; do
            [[ -f "$f" ]] || continue
            base="$(basename "$f")"
            mc cp "$f" "hc/${BUCKET}/releases/v${VERSION}/${base}"
            mc cp "$f" "hc/${BUCKET}/releases/latest/${base}"
          done

          echo "${VERSION}" | mc pipe "hc/${BUCKET}/releases/latest/VERSION"
          echo "${VERSION}" | mc pipe "hc/${BUCKET}/releases/v${VERSION}/VERSION"

          echo "Public downloads:"
          echo "  ${HOMECLOUD_CLI_PUBLIC_BASE}/latest/homecloud-linux-amd64"
          echo "  ${HOMECLOUD_CLI_PUBLIC_BASE}/v${VERSION}/homecloud-linux-amd64"
